name: Deploy Azure SQL & Config

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy-infra:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ secrets.AZURE_RG }}
          template: infra/bicep/main.bicep
          parameters: >-
            infra/parameters/${{ github.event.inputs.environment }}.parameters.json
            adminObjectId=${{ secrets.AZURE_SQL_ADMIN_OBJECT_ID }}
            adminPrincipalName=${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
            adminPrincipalType=${{ secrets.AZURE_SQL_ADMIN_PRINCIPAL_TYPE }}

  deploy-sql-schema:
    name: Deploy SQL Schema & Seed Data
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Install SqlServer PowerShell module
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module SQLServer -Scope CurrentUser -Force -AllowClobber
      - name: Resolve deployed SQL server name
        id: sqlserver
        shell: bash
        run: |
          SQL_SERVER_FQDN=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RG }}" \
            --name main \
            --query properties.outputs.sqlServerFqdn.value -o tsv)
          echo "sql_server_fqdn=$SQL_SERVER_FQDN" >> "$GITHUB_OUTPUT"
      - name: Run SQL schema scripts with Entra token
        shell: pwsh
        run: |
          ./src/sqlserver/scripts/apply_sql_files.ps1 `
            -ServerInstance "${{ steps.sqlserver.outputs.sql_server_fqdn }}" `
            -Database loan_db `
            -SqlFiles 'src/sqlserver/schema/01_create_tables.sql','src/sqlserver/seed/05_seed_branch_reference.sql'
